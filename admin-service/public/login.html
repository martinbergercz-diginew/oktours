<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>OK TOURS — přihlášení</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <h1>OK TOURS</h1>
      <p class="login-sub">Správa webu</p>

      <form id="login-form">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" autocomplete="username" required autofocus>
        <label for="password">Heslo</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Přihlásit se</button>
        <p class="login-error" id="login-error" role="alert"></p>
      </form>

      <details class="forgot">
        <summary>Zapomenuté heslo?</summary>
        <form id="forgot-form">
          <p class="login-hint">Zadej svůj e-mail a pošleme ti odkaz pro nastavení nového hesla.</p>
          <label for="forgot-email">E-mail</label>
          <input type="email" id="forgot-email" name="email" autocomplete="username">
          <button type="submit">Poslat odkaz</button>
          <p class="login-error" id="forgot-msg" role="alert"></p>
        </form>
      </details>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
