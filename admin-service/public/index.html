<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>OK TOURS — správa webu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="chat" id="chat">
      <header class="chat-header">
        <h1>OK TOURS — správa webu</h1>
        <div class="header-right">
          <button class="pub-toggle" id="confirm-toggle" type="button">Ptám se před změnou</button>
          <button class="pub-toggle" id="publish-toggle" type="button">Publikuji na náhled</button>
          <div class="state-pill" id="state-pill">Načítám…</div>
          <button class="reset-link" id="reset-conversation" title="Vyresetovat konverzaci, pokud začne dělat chyby">↺</button>
          <a class="reset-link" id="help-link" href="help.html" target="_blank" rel="noopener" title="Nápověda">?</a>
          <div class="account">
            <button class="reset-link" id="account-btn" type="button">Účet ▾</button>
            <div class="account-menu" id="account-menu" hidden>
              <div class="account-email" id="account-email"></div>
              <button type="button" id="menu-change-password">Změnit heslo</button>
              <button type="button" id="menu-users" hidden>Správa uživatelů</button>
              <button type="button" id="menu-logout">Odhlásit se</button>
            </div>
          </div>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <form class="composer" id="composer">
        <label class="upload-btn" title="Nahrát obrázek nebo PDF">
          <input type="file" id="upload" accept="image/jpeg,image/png,image/webp,application/pdf" hidden>
          <span>+</span>
        </label>
        <textarea id="input" placeholder="Napiš, co chceš změnit na webu…" rows="2" required></textarea>
        <button type="submit" id="send">Odeslat</button>
      </form>
    </main>

    <aside class="history" id="history">
      <h2>Historie změn</h2>
      <ol id="history-list">
        <li class="empty">Načítám…</li>
      </ol>
    </aside>

    <button class="history-toggle" id="history-toggle" aria-label="Otevřít historii">≡</button>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
