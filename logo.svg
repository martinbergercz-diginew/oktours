<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- Globe / travel icon circle -->
  <circle cx="26" cy="26" r="22" stroke="white" stroke-width="2.2"/>
  <!-- Latitude lines -->
  <path d="M5 20 Q26 26 47 20" stroke="white" stroke-width="1.6" fill="none"/>
  <path d="M5 32 Q26 26 47 32" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- Vertical meridian -->
  <ellipse cx="26" cy="26" rx="9" ry="22" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- Horizontal equator -->
  <line x1="4" y1="26" x2="48" y2="26" stroke="white" stroke-width="1.6"/>
  <!-- Arrow on top-right to suggest travel/motion -->
  <path d="M38 10 L43 7 L43 13" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- OK TOURS text -->
  <text x="58" y="33" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="1.5">OK TOURS</text>
</svg>
